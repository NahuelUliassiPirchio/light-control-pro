<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Black lightbulb">
  <title>Black lightbulb</title>
  <g fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Glow rays -->
    <line x1="64" y1="10" x2="64" y2="24"/>
    <line x1="28" y1="24" x2="38" y2="34"/>
    <line x1="100" y1="24" x2="90" y2="34"/>
    <line x1="14" y1="60" x2="28" y2="60"/>
    <line x1="100" y1="60" x2="114" y2="60"/>

    <!-- Bulb outline -->
    <path d="M64 24
             C42 24 26 40 26 60
             C26 74 34 84 44 92
             C48 95 50 100 50 104
             H78
             C78 100 80 95 84 92
             C94 84 102 74 102 60
             C102 40 86 24 64 24Z"/>

    <!-- Filament -->
    <path d="M50 72
             C54 66 58 64 64 64
             C70 64 74 66 78 72"/>
    <line x1="56" y1="72" x2="56" y2="84"/>
    <line x1="72" y1="72" x2="72" y2="84"/>

    <!-- Base -->
    <rect x="48" y="104" width="32" height="10" rx="3"/>
    <rect x="50" y="114" width="28" height="8" rx="3"/>
  </g>
</svg>